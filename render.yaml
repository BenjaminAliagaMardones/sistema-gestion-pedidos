services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  - type: pserv
    name: shoper-db
    plan: free
    databaseName: shoper_db
    user: shoper_user

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: shoper-backend
    plan: free
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shoper-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: APP_NAME
        value: "Sistema Shoper"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # Set this manually in Render dashboard (sensitive)
      - key: FRONTEND_URL
        fromService:
          type: web
          name: shoper-frontend
          property: host

  # ─── Frontend (React Static Site) ────────────────────────────────────────────
  - type: web
    name: shoper-frontend
    plan: free
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shoper-backend
          property: host
